    <main>

        <!-- personalização do header -->
        <header class="header">
            <img src="../imagens/1000452400 (1).png" alt="Logo Elite Cars" class="img-footer">
            <div>
                <h1 class="txtheader">Elite Cars</h1>

                    </li>

            </div>

        <!-- fim do cabeçalho -->

        <!-- inicio do formulario de cadastro -->

        <section class="section-01">
            <div class="caixa">
                <h1 class="h1-texto">Cadastre-se</h1>
                <form action="" class="form"></form>
            </div>

            <label for="">Digite seu Nome Completo</label>
            <input type="text" placeholder="Digite seu Nome" required> <br> <br>

            <label for="">Digite seu Email</label>
            <input type="email" required placeholder="Digite Aqui"> <br> <br>
            

            <label for="">Crie uma Senha</label>
            <input type="password" required placeholder="Digite Aqui"> <br> <br>


            <label for="">Digite seu CPF</label>
            <input type="number" required> <br> <br>

            <label for="">Digite seu Rg</label>
            <input type="number" required> <br> <br>

            <label for="">Digite seu Telefone</label>
            <select name="" id="">
                <option value=""></option>
                <option value="+11">+11</option>
                <option value="+51">+51</option>
                <option value="+21">+21</option>
                <option value="+61">+61</option>
                <option value="+49">+49</option>
            </select>
            <input type="number"> <br> <br>

            <label for="">Digite seu Endereço</label>
            <input type="text" required placeholder="Digite Aqui"> <br> <br>


            <input type="submit" value="Finalize seu Cadastro">


            <button>
                <a href="elite-cars.html">Voltar a Página inicial</a>
            </button>
        </section>

            <section class="texto-body">
                <div class="texto-final">
                    <p>Já tem uma conta?</p>
                    <a href="">Faça seu login aqui</a>
                </div>
        
            </section>
